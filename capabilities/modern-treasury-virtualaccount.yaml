        after_cursor: tools.after_cursor
        per_page: tools.per_page
        internal_account_id: tools.internal_account_id
        counterparty_id: tools.counterparty_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-virtual-account
      description: create virtual_account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: modern-treasury-virtualaccount.createvirtualaccount
      with:
        Idempotency-Key: tools.Idempotency-Key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-virtual-account
      description: get virtual_account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: modern-treasury-virtualaccount.getvirtualaccount
      outputParameters:
      - type: object
        mapping: $.
    - name: update-virtual-account
