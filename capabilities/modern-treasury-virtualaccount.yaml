naftiko: 1.0.0-alpha2
info:
  label: Modern Treasury — VirtualAccount
  description: 'Modern Treasury — VirtualAccount. 5 operations. Lead operation: list virtual_accounts. Self-contained Naftiko
    capability covering one Modern Treasury business surface.'
  tags:
  - Modern Treasury
  - VirtualAccount
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MODERN_TREASURY_API_KEY: MODERN_TREASURY_API_KEY
capability:
  consumes:
  - type: http
    namespace: modern-treasury-virtualaccount
    baseUri: http://localhost:3000
    description: Modern Treasury — VirtualAccount business capability. Self-contained, no shared references.
    resources:
    - name: api-virtual_accounts
      path: /api/virtual_accounts
      operations:
      - name: listvirtualaccounts
        method: GET
        description: list virtual_accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: after_cursor
          in: query
          type: string
        - name: per_page
          in: query
          type: integer
        - name: internal_account_id
          in: query
          type: string
        - name: counterparty_id
          in: query
          type: string
      - name: createvirtualaccount
        method: POST
        description: create virtual_account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Idempotency-Key
          in: header
          type: string
          description: This key should be something unique, preferably something like an UUID.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-virtual_accounts-id
      path: /api/virtual_accounts/{id}
      operations:
      - name: getvirtualaccount
        method: GET
        description: get virtual_account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatevirtualaccount
        method: PATCH
        description: update virtual_account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deletevirtualaccount
        method: DELETE
        description: delete virtual_account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.MODERN_TREASURY_USER}}'
      password: '{{env.MODERN_TREASURY_PASS}}'
  exposes:
  - type: rest
    namespace: modern-treasury-virtualaccount-rest
    port: 8080
    description: REST adapter for Modern Treasury — VirtualAccount. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/virtual-accounts
      name: api-virtual-accounts
      description: REST surface for api-virtual_accounts.
      operations:
      - method: GET
        name: listvirtualaccounts
        description: list virtual_accounts
        call: modern-treasury-virtualaccount.listvirtualaccounts
        with:
          after_cursor: rest.after_cursor
          per_page: rest.per_page
          internal_account_id: rest.internal_account_id
          counterparty_id: rest.counterparty_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createvirtualaccount
        description: create virtual_account
        call: modern-treasury-virtualaccount.createvirtualaccount
        with:
          Idempotency-Key: rest.Idempotency-Key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/virtual-accounts/{id}
      name: api-virtual-accounts-id
      description: REST surface for api-virtual_accounts-id.
      operations:
      - method: GET
        name: getvirtualaccount
        description: get virtual_account
        call: modern-treasury-virtualaccount.getvirtualaccount
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatevirtualaccount
        description: update virtual_account
        call: modern-treasury-virtualaccount.updatevirtualaccount
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletevirtualaccount
        description: delete virtual_account
        call: modern-treasury-virtualaccount.deletevirtualaccount
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: modern-treasury-virtualaccount-mcp
    port: 9090
    transport: http
    description: MCP adapter for Modern Treasury — VirtualAccount. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-virtual-accounts
      description: list virtual_accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
