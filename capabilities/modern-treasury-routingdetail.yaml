    resources:
    - name: api-accounts_type-account_id-routing_details
      path: /api/{accounts_type}/{account_id}/routing_details
      operations:
      - name: listroutingdetails
        method: GET
        description: list routing_details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accounts_type
          in: path
          type: string
          required: true
        - name: account_id
          in: path
          type: string
          description: The ID of the account.
          required: true
        - name: after_cursor
          in: query
          type: string
        - name: per_page
          in: query
          type: integer
      - name: createroutingdetail
        method: POST
        description: create routing_detail
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Idempotency-Key
          in: header
          type: string
          description: This key should be something unique, preferably something like an UUID.
        - name: accounts_type
          in: path
          type: string
          required: true
        - name: account_id
          in: path
          type: string
          description: The ID of the account.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-accounts_type-account_id-routing_details-id
      path: /api/{accounts_type}/{account_id}/routing_details/{id}
      operations:
      - name: getroutingdetail
        method: GET
        description: get routing_detail
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accounts_type
          in: path
          type: string
          required: true
        - name: account_id
          in: path
          type: string
          description: The ID of the account.
          required: true
        - name: id
          in: path
          type: string
          description: The ID of the routing detail.
          required: true
      - name: deleteroutingdetail
        method: DELETE
        description: delete routing_detail
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accounts_type
          in: path
          type: string
          required: true
        - name: account_id
          in: path
          type: string
          description: The ID of the account.
          required: true
        - name: id
          in: path
          type: string
          description: The ID of the routing detail.
          required: true
