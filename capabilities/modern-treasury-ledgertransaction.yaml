          in: path
          type: string
          description: The ID of the ledger transaction to partially post.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-ledger_transactions-id-reversal
      path: /api/ledger_transactions/{id}/reversal
