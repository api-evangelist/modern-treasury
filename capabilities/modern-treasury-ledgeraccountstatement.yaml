      username: '{{env.MODERN_TREASURY_USER}}'
      password: '{{env.MODERN_TREASURY_PASS}}'
  exposes:
  - type: rest
    namespace: modern-treasury-ledgeraccountstatement-rest
    port: 8080
    description: REST adapter for Modern Treasury — LedgerAccountStatement. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/ledger-account-statements
      name: api-ledger-account-statements
      description: REST surface for api-ledger_account_statements.
      operations:
      - method: POST
        name: createledgeraccountstatement
        description: create ledger_account_statement
        call: modern-treasury-ledgeraccountstatement.createledgeraccountstatement
        with:
          Idempotency-Key: rest.Idempotency-Key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/ledger-account-statements/{id}
      name: api-ledger-account-statements-id
      description: REST surface for api-ledger_account_statements-id.
      operations:
      - method: GET
        name: getledgeraccountstatement
        description: get ledger_account_statement
        call: modern-treasury-ledgeraccountstatement.getledgeraccountstatement
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
