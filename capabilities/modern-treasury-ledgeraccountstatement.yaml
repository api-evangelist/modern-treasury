        mapping: $.
    - name: get-ledger-account-statement
      description: get ledger_account_statement
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: modern-treasury-ledgeraccountstatement.getledgeraccountstatement
      outputParameters:
      - type: object
        mapping: $.
