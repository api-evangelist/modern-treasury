    port: 9090
    transport: http
    description: MCP adapter for Modern Treasury — LedgerAccountStatement. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: create-ledger-account-statement
      description: create ledger_account_statement
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: modern-treasury-ledgeraccountstatement.createledgeraccountstatement
      with:
        Idempotency-Key: tools.Idempotency-Key
