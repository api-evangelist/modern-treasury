    description: Modern Treasury — LedgerAccountStatement business capability. Self-contained, no shared references.
    resources:
    - name: api-ledger_account_statements
      path: /api/ledger_account_statements
      operations:
      - name: createledgeraccountstatement
        method: POST
        description: create ledger_account_statement
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Idempotency-Key
          in: header
          type: string
          description: This key should be something unique, preferably something like an UUID.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-ledger_account_statements-id
      path: /api/ledger_account_statements/{id}
      operations:
      - name: getledgeraccountstatement
        method: GET
        description: get ledger_account_statement
