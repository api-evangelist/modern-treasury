naftiko: 1.0.0-alpha2
info:
  label: Modern Treasury — BulkRequest
  description: 'Modern Treasury — BulkRequest. 3 operations. Lead operation: list bulk_requests. Self-contained Naftiko capability
    covering one Modern Treasury business surface.'
  tags:
  - Modern Treasury
  - BulkRequest
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MODERN_TREASURY_API_KEY: MODERN_TREASURY_API_KEY
capability:
  consumes:
  - type: http
    namespace: modern-treasury-bulkrequest
    baseUri: http://localhost:3000
    description: Modern Treasury — BulkRequest business capability. Self-contained, no shared references.
    resources:
    - name: api-bulk_requests
      path: /api/bulk_requests
      operations:
      - name: listbulkrequests
        method: GET
        description: list bulk_requests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: after_cursor
          in: query
          type: string
        - name: per_page
          in: query
          type: integer
        - name: status
          in: query
          type: string
          description: One of pending, processing, or completed.
        - name: resource_type
          in: query
          type: string
          description: One of payment_order, expected_payment, or ledger_transaction.
        - name: action_type
          in: query
          type: string
          description: One of create, or update.
      - name: createbulkrequest
        method: POST
        description: create bulk_request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Idempotency-Key
          in: header
          type: string
          description: This key should be something unique, preferably something like an UUID.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-bulk_requests-id
      path: /api/bulk_requests/{id}
      operations:
      - name: getbulkrequest
        method: GET
        description: get bulk_request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.MODERN_TREASURY_USER}}'
      password: '{{env.MODERN_TREASURY_PASS}}'
  exposes:
  - type: rest
    namespace: modern-treasury-bulkrequest-rest
    port: 8080
    description: REST adapter for Modern Treasury — BulkRequest. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/bulk-requests
      name: api-bulk-requests
      description: REST surface for api-bulk_requests.
      operations:
      - method: GET
        name: listbulkrequests
        description: list bulk_requests
        call: modern-treasury-bulkrequest.listbulkrequests
        with:
          after_cursor: rest.after_cursor
          per_page: rest.per_page
          status: rest.status
          resource_type: rest.resource_type
          action_type: rest.action_type
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createbulkrequest
        description: create bulk_request
        call: modern-treasury-bulkrequest.createbulkrequest
        with:
          Idempotency-Key: rest.Idempotency-Key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/bulk-requests/{id}
      name: api-bulk-requests-id
      description: REST surface for api-bulk_requests-id.
      operations:
      - method: GET
        name: getbulkrequest
        description: get bulk_request
        call: modern-treasury-bulkrequest.getbulkrequest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: modern-treasury-bulkrequest-mcp
    port: 9090
    transport: http
    description: MCP adapter for Modern Treasury — BulkRequest. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-bulk-requests
      description: list bulk_requests
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: modern-treasury-bulkrequest.listbulkrequests
      with:
        after_cursor: tools.after_cursor
        per_page: tools.per_page
        status: tools.status
        resource_type: tools.resource_type
        action_type: tools.action_type
      outputParameters:
      - type: object
        mapping: $.
    - name: create-bulk-request
      description: create bulk_request
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: modern-treasury-bulkrequest.createbulkrequest
      with:
        Idempotency-Key: tools.Idempotency-Key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-bulk-request
      description: get bulk_request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: modern-treasury-bulkrequest.getbulkrequest
      outputParameters:
      - type: object
        mapping: $.
