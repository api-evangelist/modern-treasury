naftiko: 1.0.0-alpha2
info:
  label: Modern Treasury — Ledger
  description: 'Modern Treasury — Ledger. 5 operations. Lead operation: list ledgers. Self-contained Naftiko capability covering
    one Modern Treasury business surface.'
  tags:
  - Modern Treasury
  - Ledger
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MODERN_TREASURY_API_KEY: MODERN_TREASURY_API_KEY
capability:
  consumes:
  - type: http
    namespace: modern-treasury-ledger
    baseUri: http://localhost:3000
    description: Modern Treasury — Ledger business capability. Self-contained, no shared references.
    resources:
    - name: api-ledgers
      path: /api/ledgers
      operations:
      - name: listledgers
        method: GET
        description: list ledgers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: after_cursor
          in: query
          type: string
        - name: per_page
          in: query
          type: integer
        - name: updated_at
          in: query
          type: object
          description: Use `gt` (>), `gte` (>=), `lt` (<), `lte` (<=), or `eq` (=) to filter by the posted at timestamp. For
            example, for all times after Jan 1 2000 12:00 UTC, use upd
      - name: createledger
        method: POST
        description: create ledger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Idempotency-Key
          in: header
          type: string
          description: This key should be something unique, preferably something like an UUID.
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: api-ledgers-id
      path: /api/ledgers/{id}
      operations:
      - name: getledger
        method: GET
        description: get ledger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateledger
        method: PATCH
        description: update ledger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
      - name: deleteledger
        method: DELETE
        description: delete ledger
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: basic
      username: '{{env.MODERN_TREASURY_USER}}'
      password: '{{env.MODERN_TREASURY_PASS}}'
  exposes:
  - type: rest
    namespace: modern-treasury-ledger-rest
    port: 8080
    description: REST adapter for Modern Treasury — Ledger. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/ledgers
      name: api-ledgers
      description: REST surface for api-ledgers.
      operations:
      - method: GET
        name: listledgers
        description: list ledgers
        call: modern-treasury-ledger.listledgers
        with:
          after_cursor: rest.after_cursor
          per_page: rest.per_page
          updated_at: rest.updated_at
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createledger
        description: create ledger
        call: modern-treasury-ledger.createledger
        with:
          Idempotency-Key: rest.Idempotency-Key
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/api/ledgers/{id}
      name: api-ledgers-id
      description: REST surface for api-ledgers-id.
      operations:
      - method: GET
        name: getledger
        description: get ledger
        call: modern-treasury-ledger.getledger
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateledger
        description: update ledger
        call: modern-treasury-ledger.updateledger
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteledger
        description: delete ledger
        call: modern-treasury-ledger.deleteledger
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: modern-treasury-ledger-mcp
    port: 9090
    transport: http
    description: MCP adapter for Modern Treasury — Ledger. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-ledgers
      description: list ledgers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: modern-treasury-ledger.listledgers
      with:
        after_cursor: tools.after_cursor
        per_page: tools.per_page
        updated_at: tools.updated_at
      outputParameters:
      - type: object
        mapping: $.
    - name: create-ledger
      description: create ledger
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: modern-treasury-ledger.createledger
      with:
        Idempotency-Key: tools.Idempotency-Key
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ledger
      description: get ledger
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: modern-treasury-ledger.getledger
      outputParameters:
      - type: object
        mapping: $.
    - name: update-ledger
      description: update ledger
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: modern-treasury-ledger.updateledger
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-ledger
      description: delete ledger
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: modern-treasury-ledger.deleteledger
      outputParameters:
      - type: object
        mapping: $.
