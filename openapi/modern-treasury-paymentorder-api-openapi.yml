          nullable: true
          description: The reason for the hold
        resolution:
          type: string
          nullable: true
          description: The resolution of the hold
        resolved_at:
          type: string
          format: date-time
          nullable: true
          description: When the hold was resolved
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Additional metadata for the hold
          nullable: true
      required:
