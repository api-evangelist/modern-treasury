                    - hu_interbank_clearing_code
                    - id_sknbi_code
                    - il_bank_code
                    - in_ifsc
                    - jp_zengin_code
                    - my_branch_code
                    - mx_bank_identifier
                    - nz_national_clearing_code
                    - pl_national_clearing_code
                    - se_bankgiro_clearing_code
                    - sg_interbank_clearing_code
                    - swift
                    - za_national_clearing_code
                  payment_type:
                    type: string
                    enum:
                    - ach
                    - au_becs
                    - bacs
                    - book
                    - card
                    - chats
                    - check
                    - cross_border
                    - dk_nets
                    - eft
                    - gb_fps
                    - hu_ics
                    - interac
                    - masav
                    - mx_ccen
                    - neft
                    - nics
                    - nz_becs
                    - pl_elixir
                    - provxchange
                    - ro_sent
                    - rtp
                    - se_bankgirot
                    - sen
                    - sepa
                    - sg_giro
                    - sic
                    - signet
                    - sknbi
                    - stablecoin
                    - wire
                    - zengin
                required:
                - routing_number
                - routing_number_type
            external_id:
              type: string
              nullable: true
              description: An optional user-defined 180 character unique identifier.
            metadata:
              type: object
              additionalProperties:
                type: string
              example:
                key: value
                foo: bar
                modern: treasury
              description: Additional data represented as key-value pairs. Both the key and value must be strings.
            party_name:
              type: string
              description: If this value isn't provided, it will be inherited from the counterparty's name.
            party_identifier:
              type: string
            ledger_account:
              $ref: '#/components/schemas/ledger_account_create_request'
              description: Specifies a ledger account object that will be created with the external account. The resulting ledger account is linked to the external account for auto-ledgering Payment objects. See https://docs.moderntreasury.com/docs/linking-to-other-modern-treasury-objects for more details.
            plaid_processor_token:
              type: string
              description: If you've enabled the Modern Treasury + Plaid integration in your Plaid account, you can pass the processor token in this field.
            contact_details:
              type: array
              items:
                $ref: '#/components/schemas/contact_detail_create_request'
          description: Either `receiving_account` or `receiving_account_id` must be present. When using `receiving_account_id`, you may pass the id of an external account or an internal account.
        ledger_transaction:
          $ref: '#/components/schemas/ledger_transaction_create_request'
          description: Specifies a ledger transaction object that will be created with the payment order. If the ledger transaction cannot be created, then the payment order creation will fail. The resulting ledger transaction will mirror the status of the payment order.
        ledger_transaction_id:
          type: string
          format: uuid
          description: Either ledger_transaction or ledger_transaction_id can be provided. Only a pending ledger transaction can be attached upon payment order creation. Once the payment order is created, the status of the ledger transaction tracks the payment order automatically.
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/line_item_request'
          description: An array of line items that must sum up to the amount of the payment order.
        transaction_monitoring_enabled:
          type: boolean
          deprecated: true
          description: A flag that determines whether a payment order should go through transaction monitoring.
        ultimate_originating_account_id:
          type: string
          format: uuid
          description: The ultimate originating account ID. Can be a `virtual_account` or `internal_account`.
        ultimate_originating_party_address:
          type: object
          nullable: true
          description: Address of the ultimate originator of the payment order.
          properties:
            line1:
              type: string
            line2:
              type: string
            locality:
              type: string
              description: Locality or City.
            region:
              type: string
              description: Region or State.
            postal_code:
              type: string
              description: The postal code of the address.
            country:
              type: string
              description: Country code conforms to [ISO 3166-1 alpha-2]
        vendor_attributes:
          type: object
          description: Additional vendor specific fields for this payment. Data must be represented as key-value pairs.
      required:
      - type
      - amount
      - direction
      - originating_account_id
    transaction_update_request:
      type: object
      properties:
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Additional data in the form of key-value pairs. Pairs can be removed by passing an empty string or `null` as the value.
    expected_payment_update_request:
      type: object
      properties:
        external_id:
          type: string
          nullable: true
          description: An optional user-defined 180 character unique identifier.
        amount_upper_bound:
          type: integer
          nullable: true
          description: The highest amount this expected payment may be equal to. Value in specified currency's smallest unit. e.g. $10 would be represented as 1000.
        amount_lower_bound:
          type: integer
          nullable: true
          description: The lowest amount this expected payment may be equal to. Value in specified currency's smallest unit. e.g. $10 would be represented as 1000.
        direction:
          type: string
          nullable: true
          enum:
          - credit
          - debit
          description: One of credit or debit. When you are receiving money, use credit. When you are being charged, use debit.
        internal_account_id:
          type: string
          nullable: true
          format: uuid
          description: The ID of the Internal Account for the expected payment.
        type:
          $ref: '#/components/schemas/expected_payment_type'
        currency:
          $ref: '#/components/schemas/currency'
          nullable: true
          description: Must conform to ISO 4217. Defaults to the currency of the internal account.
        date_upper_bound:
          type: string
          format: date
          nullable: true
          description: 'The latest date the payment may come in. Format: yyyy-mm-dd'
        date_lower_bound:
          type: string
          format: date
          nullable: true
          description: 'The earliest date the payment may come in. Format: yyyy-mm-dd'
        description:
          type: string
          nullable: true
          description: An optional description for internal use.
        statement_descriptor:
          type: string
          nullable: true
          description: The statement description you expect to see on the transaction. For ACH payments, this will be the full line item passed from the bank. For wire payments, this will be the OBI field on the wire. For check payments, this will be the memo field.
        metadata:
          type: object
          description: Additional data represented as key-value pairs. Both the key and value must be strings.
          additionalProperties:
            type: string
          example:
            key: value
            foo: bar
            modern: treasury
        counterparty_id:
          type: string
          format: uuid
          description: The ID of the counterparty you expect for this payment.
          nullable: true
        remittance_information:
          type: string
          nullable: true
          description: For `ach`, this field will be passed through on an addenda record. For `wire` payments the field will be passed through as the "Originator to Beneficiary Information", also known as OBI or Fedwire tag 6000.
        reconciliation_groups:
          type: object
          nullable: true
          description: The reconciliation groups you have for this payment.
        reconciliation_filters:
          type: object
          nullable: true
          description: The reconciliation filters you have for this payment.
        reconciliation_rule_variables:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/reconciliation_rule_variable'
          description: An array of reconciliation rule variables for this payment.
        amount_reconciled:
          type: integer
          nullable: true
          description: The amount reconciled for this expected payment. Value in specified currency's smallest unit. e.g. $10 would be represented as 1000.
        amount_reconciled_direction:
          type: string
          nullable: true
          enum:
          - credit
          - debit
          description: One of credit or debit. Indicates whether amount_reconciled is a credit or debit amount.
        amount_unreconciled:
          type: integer
          nullable: true
          description: The amount that remains unreconciled for this expected payment. Value in specified currency's smallest unit. e.g. $10 would be represented as 1000.
        amount_unreconciled_direction:
          type: string
          nullable: true
          enum:
          - credit
          - debit
          description: One of credit or debit. Indicates whether amount_unreconciled is a credit or debit amount.
        status:
          type: string
          nullable: true
          enum:
          - reconciled
          description: The Expected Payment's status can be updated from partially_reconciled to reconciled.
    line_item_request:
      type: object
      properties:
        amount:
          type: integer
          description: Value in specified currency's smallest unit. e.g. $10 would be represented as 1000.
        metadata:
          type: object
          description: Additional data represented as key-value pairs. Both the key and value must be strings.
          additionalProperties:
            type: string
          example:
            key: value
            foo: bar
            modern: treasury
        description:
          type: string
          description: A free-form description of the line item.
          nullable: true
        accounting_category_id:
          type: string
          description: The ID of one of your accounting categories. Note that these will only be accessible if your accounting system has been connected.
          nullable: true
      required:
      - amount
    bulk_request_create_request:
      type: object
      properties:
        action_type:
          type: string
          enum:
          - create
          - update
          - delete
          description: One of create, or update.
        resource_type:
          type: string
          enum:
          - payment_order
          - ledger_account
          - ledger_transaction
          - expected_payment
          - transaction
          - transaction_line_item
          - entity_link
          description: One of payment_order, expected_payment, or ledger_transaction.
        metadata:
          type: object
          description: Additional data represented as key-value pairs. Both the key and value must be strings.
          additionalProperties:
            type: string
          example:
            key: value
            foo: bar
            modern: treasury
        resources:
          type: array
          description: An array of objects where each object contains the input params for a single `action_type` request on a `resource_type` resource
          items:
            anyOf:
            - $ref: '#/components/schemas/payment_order_async_create_request'
            - $ref: '#/components/schemas/expected_payment_create_request'
            - $ref: '#/components/schemas/ledger_transaction_create_request'
            - $ref: '#/components/schemas/ledger_account_create_request'
            - $ref: '#/components/schemas/transaction_create_request'
            - type: object
              properties:
                id:
                  type: string
                  format: uuid
            - allOf:
              - $ref: '#/components/schemas/payment_order_update_request'
              - type: object
                properties:
                  id:
                    type: string
                    format: uuid
              x-stainless-variantName: payment_order_update_request_with_id
            - allOf:
              - $ref: '#/components/schemas/expected_payment_update_request'
              - type: object
                properties:
                  id:
                    type: string
                    format: uuid
              x-stainless-variantName: expected_payment_update_request_with_id
            - allOf:
              - $ref: '#/components/schemas/transaction_update_request'
              - type: object
                properties:
                  id:
                    type: string
                    format: uuid
              x-stainless-variantName: transaction_update_request_with_id
            - allOf:
              - $ref: '#/components/schemas/ledger_transaction_update_request'
              - type: object
                properties:
                  id:
                    type: string
                    format: uuid
              x-stainless-variantName: ledger_transaction_update_request_with_id
      required:
      - action_type
      - resource_type
      - resources
  parameters:
    metadata_query:
      name: metadata
      in: query
      schema:
        type: object
        additionalProperties:
          type: string
      style: deepObject
      explode: true
      required: false
      description: For example, if you want to query for records with metadata key `Type` and value `Loan`, the query would be `metadata%5BType%5D=Loan`. This encodes the query parameters.
  securitySchemes:
    basic_auth:
      type: http
      scheme: basic
