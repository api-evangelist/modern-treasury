specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Modern Treasury
providerId: modern-treasury
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Payments
description: Modern Treasury REST API rate limits per organization.
sources:
  - https://www.moderntreasury.com/pricing
  - https://docs.moderntreasury.com/api/getting-started/api-rate-limits
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: REST API
    scope: organization
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
  - name: Webhook deliveries
    scope: endpoint
    metric: concurrent
    limit: high
